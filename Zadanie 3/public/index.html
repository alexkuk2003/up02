<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BobbyHost | Вход и Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили вкладок */
        .tabs-header {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            background: #f1f1f1;
            border: none;
            outline: none;
            font-weight: bold;
            transition: 0.3s;
            color: #555;
            margin: 0;
        }
        .tab-btn.active {
            background: #fff;
            color: #27ae60;
            border-bottom: 3px solid #27ae60;
        }
        .tab-btn:hover:not(.active) {
            background: #e9e9e9;
        }

        /* Контейнеры форм */
        .form-content {
            display: none; /* Скрыто по умолчанию */
        }
        .form-content.active {
            display: block; /* Показываем активную вкладку */
        }

        /* Капча (общие стили) */
        .captcha-wrapper {
            background: #f0f7ff;
            padding: 15px;
            border: 1px solid #d0e3f0;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
        }
        .captcha-display {
            display: inline-block;
            background: #34495e;
            color: #fff;
            padding: 8px 18px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 6px;
            border-radius: 4px;
            margin-bottom: 10px;
            user-select: none;
        }
        .captcha-label {
            font-size: 13px;
            color: #444;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .captcha-input {
            border: 2px solid #3498db !important;
            font-size: 18px !important;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-box">
        <h1>BobbyHost.ru</h1>
        
        <!-- Заголовки вкладок -->
        <div class="tabs-header">
            <button class="tab-btn active" onclick="openTab(event, 'loginTab')">Вход</button>
            <button class="tab-btn" onclick="openTab(event, 'registerTab')">Регистрация</button>
        </div>

        <!-- ВКЛАДКА: ВХОД -->
        <div id="loginTab" class="form-content active">
		            <input type="email" id="loginEmail" placeholder="Email (Вход)">
            <input type="password" id="loginPass" placeholder="Пароль">
            
            <div class="captcha-wrapper">
                <p class="captcha-label">Защита от спам-ботов. Подтвердите, что Вы - не спам-бот, написав в это поле сгенерированное число:</p>
                <div class="captcha-display captcha-code">00000</div>
                <input type="text" class="captcha-input" placeholder="Число здесь" maxlength="5">
            </div>
            
            <button onclick="auth('login')" class="btn-main">Войти в аккаунт</button>
        </div>

        <!-- ВКЛАДКА: РЕГИСТРАЦИЯ -->
        <div id="registerTab" class="form-content">
            <input type="email" id="regEmail" placeholder="Ваш Email (Регистрация)">
            <input type="password" id="regPass" placeholder="Придумайте пароль">
            
            <div class="captcha-wrapper">
                <p class="captcha-label">Защита от спам-ботов. Подтвердите, что Вы - не спам-бот, написав в это поле сгенерированное число:</p>
                <div class="captcha-display captcha-code">00000</div>
                <input type="text" class="captcha-input" placeholder="Число здесь" maxlength="5">
            </div>
            
            <button onclick="auth('register')" class="btn-alt">Зарегистрироваться</button>
        </div>
    </div>

    <script>
        let currentCaptcha = "";

        // Переключение вкладок
        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("form-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }
            const buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            
            generateCaptcha(); // Новое число при смене вкладки
        }

        // Генерация капчи
        function generateCaptcha() {             currentCaptcha = Math.floor(10000 + Math.random() * 90000).toString();
            // Обновляем число во всех видимых блоках капчи
            const displays = document.getElementsByClassName('captcha-code');
            for (let d of displays) { d.innerText = currentCaptcha; }
            // Очищаем инпуты капчи
            const inputs = document.getElementsByClassName('captcha-input');
            for (let i of inputs) { i.value = ""; }
        }

        window.onload = generateCaptcha;

        async function auth(type) {
            // Определяем, из какой вкладки брать данные
            const prefix = (type === 'login') ? 'login' : 'reg';
            const email = document.getElementById(prefix + 'Email').value;
            const password = document.getElementById(prefix + 'Pass').value;
            
            // Берем ввод капчи из активной вкладки
            const activeTab = document.getElementById(type + 'Tab');
            const userInput = activeTab.querySelector('.captcha-input').value;

            // 1. Проверка капчи
            if (userInput !== currentCaptcha) {
                alert("Ошибка! Неверное число защиты от спама.");
                generateCaptcha();
                return;
            }

            // 2. Отправка данных
            try {
                const res = await fetch(`/api/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
				const data = await res.json();
                
                if (data.success) {
                    if(type === 'login') {
                        localStorage.setItem('userId', data.userId);
                        location.href = 'dashboard.html';
                    } else { 
                        alert('Регистрация прошла успешно! Теперь перейдите во вкладку Вход.'); 
                        generateCaptcha();
                    }
                } else { 
                    alert(data.error); 
                    generateCaptcha();
                }
            } catch (err) {
                alert("Ошибка сервера");
                generateCaptcha();
            }
        }
    </script>
</body>
</html>
